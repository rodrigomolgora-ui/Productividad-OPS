<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte Productividad OPS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--bg2:#181c27;--bg3:#1e2333;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e8eaf0;--text2:#8b909e;--text3:#555b6b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1.5rem;}
.container{max-width:1000px;margin:0 auto;}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;}
.title{font-size:22px;font-weight:600;letter-spacing:-0.5px;}
.subtitle{font-size:12px;color:var(--text2);margin-top:3px;}
.date-badge{font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);background:var(--bg3);}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#3b82f6,transparent);opacity:0.5;}
.stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.stat-val{font-size:24px;font-weight:600;letter-spacing:-0.5px;}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:1rem;}
.filters{display:flex;gap:6px;flex-wrap:wrap;}
.fb{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;}
.fb:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}
.fb.active{background:rgba(255,255,255,0.08);color:var(--text);border-color:rgba(255,255,255,0.2);}
.search-wrap{flex:1;min-width:200px;}
.search-wrap input{font-family:'DM Sans',sans-serif;width:100%;font-size:13px;padding:7px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);outline:none;}
.search-wrap input:focus{border-color:#3b82f6;}
.search-wrap input::placeholder{color:var(--text3);}
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{border-bottom:1px solid var(--border2);}
th{padding:10px 14px;font-size:11px;font-weight:500;color:var(--text3);text-align:left;white-space:nowrap;cursor:pointer;user-select:none;text-transform:uppercase;letter-spacing:.5px;background:var(--bg2);}
th.sorted{color:#3b82f6;}th.right{text-align:right;}
.sa{font-size:10px;margin-left:3px;opacity:.5;}th.sorted .sa{opacity:1;}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:last-child{border-bottom:none;}tbody tr:hover{background:rgba(255,255,255,0.025);}
td{padding:11px 14px;vertical-align:middle;background:var(--bg2);}td.right{text-align:right;}
.rep-name{font-weight:500;}
.proc-badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;text-transform:uppercase;}
.util-row{display:flex;align-items:center;gap:8px;}
.util-bar{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.07);overflow:hidden;min-width:50px;}
.util-fill{height:100%;border-radius:2px;}
.util-v{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;min-width:40px;text-align:right;}
.mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);}
tfoot td{background:var(--bg3);font-size:11px;font-weight:500;color:var(--text2);border-top:1px solid var(--border2);padding:9px 14px;}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px;}
</style>
</head>
<body>
<div class="container">
<div class="header-top">
  <div><div class="title">Reporte de productividad</div><div class="subtitle" id="rc"></div></div>
  <div class="date-badge" id="db"></div>
</div>
<div class="stats">
  <div class="stat"><div class="stat-label">Representantes</div><div class="stat-val" id="s1"></div></div>
  <div class="stat"><div class="stat-label">Prod. neta prom.</div><div class="stat-val" id="s2"></div></div>
  <div class="stat"><div class="stat-label">Utilización prom.</div><div class="stat-val" id="s3"></div></div>
  <div class="stat"><div class="stat-label">Total unidades</div><div class="stat-val" id="s4"></div></div>
</div>
<div class="controls">
  <div class="filters" id="flt"></div>
  <div class="search-wrap"><input type="search" id="srch" placeholder="Buscar representante..." oninput="apl()"></div>
</div>
<div class="table-wrap"><table>
  <thead><tr>
    <th style="width:210px" onclick="srt('nombre')">Representante <span class="sa" id="a0">↕</span></th>
    <th style="width:90px" onclick="srt('proceso')">Proceso <span class="sa" id="a1">↕</span></th>
    <th class="right" style="width:85px" onclick="srt('prod')">Prod. neta <span class="sa" id="a2">↕</span></th>
    <th style="width:130px" onclick="srt('util')">Utilización <span class="sa" id="a3">↕</span></th>
    <th style="width:95px" onclick="srt('tiempo')">T. proceso <span class="sa" id="a4">↕</span></th>
    <th class="right" style="width:85px" onclick="srt('unidades')">Unidades <span class="sa" id="a5">↕</span></th>
  </tr></thead>
  <tbody id="tb"></tbody>
  <tfoot><tr><td colspan="2">Promedio / Total visible</td><td style="text-align:right" id="fp"></td><td id="fu"></td><td></td><td style="text-align:right" id="fuu"></td></tr></tfoot>
</table></div>
</div>
<script>
const FECHA="21 junio 2026 — Turno 1B  05:40 a 15:00";
const D=[
["Cristian Ivan Cen","Pack",137,70.53,"05:45:52",795],
["Maria Belinda Del Rosario Pech","Pack",270,89.99,"06:30:44",1761],
["Tania Guadalupe Pereira","Pack",243,92.44,"07:55:52",1929],
["Sarahy Elizabet Puc","Pack",157,87.07,"05:14:52",825],
["Meri Carolina Gallegos","Pack",126,48.25,"00:03:48",8],
["Roger Alexander Perez","Pack",422,89.14,"08:11:59",3468],
["Dariana Ballestero","P2S",44,76.91,"08:13:14",362],
["Francis Jhoana Pacho","P2S",36,74.02,"02:03:09",75],
["Sebastian Alberto Lopez","P2S",34,67.64,"08:12:44",286],
["Hugo Guillermo Alvarez","P2S",47,86.64,"03:06:21",149],
["Karelly Vanessa Puc","P2S",52,73.76,"02:43:10",142],
["Didier Mateo Ek","P2S",54,77.91,"02:58:56",164],
["Daniel Graciano Cetina","P2S",50,79.64,"02:58:11",151],
["Nataly Fernanda Tilan","Picking",23,56.18,"00:10:07",4],
["Cristian Ivan Cen","Picking",88,70.11,"00:21:48",32],
["Maria Belinda Del Rosario Pech","Picking",99,86.02,"02:00:51",200],
["Marco Antonio Lopez","Picking",43,70.30,"04:50:20",212],
["Francis Jhoana Pacho","Picking",27,74.78,"05:41:25",155],
["Hannia Carime Caballero","Picking",75,86.10,"05:18:15",402],
["Hugo Guillermo Alvarez","Picking",60,85.56,"00:47:26",48],
["Marissa Isabel Cisneros","Picking",101,86.55,"08:00:37",814],
["Fatima Rebeca Balan","Picking",88,83.21,"05:28:29",484],
["Joandry Guadalupe Dorantes","Picking",78,74.02,"04:18:52",339],
["Eduardo Ricardo Quintal","Picking",100,85.95,"04:10:33",419],
["Karelly Vanessa Puc","Picking",90,81.55,"05:12:34",472],
["Ana Abigail Puc","Picking",18,41.60,"00:06:27",2],
["Keila Carina Ojeda","Picking",89,84.71,"05:29:36",493],
["Didier Mateo Ek","Picking",78,80.56,"01:29:57",118],
["Adriana Jacqueline Pool","Picking",81,85.94,"08:19:30",677],
["Numas Pompilio Rabelo","Picking",91,74.08,"00:50:02",76],
["Enrique Eduardo Saenz","Picking",81,77.54,"05:21:40",438],
["Pablo Antonio Madera","Picking",78,80.13,"08:09:10",636],
["Nataly Fernanda Tilan","Batch",83,63.23,"01:39:41",138],
["Dariana Ballestero","Batch",5,14.35,"00:10:27",1],
["Yaneli Saudizaret Quen","Batch",124,82.19,"01:48:37",226],
["Nataly Fernanda Tilan","Wallin",449,91.55,"03:41:37",1662],
["Yaneli Saudizaret Quen","Wallin",441,81.68,"06:14:10",2754],
["Jesus Alberto Lavalle","HU",329,92.13,"04:59:04",1642],
["Ana Abigail Puc","HU",254,68.07,"05:16:13",1342],
["Didier Mateo Ek","HU",44,61.92,"01:29:43",67],
["Maria Belem Camargo","HU",332,77.72,"07:45:51",2578],
["Diego Lopez","HU",155,74.67,"01:05:59",171],
["Karim Alejandro Clemente","HU",70,68.81,"06:16:23",443],
["Daniel Graciano Cetina","HU",74,65.19,"05:19:13",397]
];
const DATA=D.map(r=>({nombre:r[0],proceso:r[1],prod:r[2],util:r[3],tiempo:r[4],unidades:r[5]}));
const CP=[['#3b82f6','rgba(59,130,246,0.13)','rgba(59,130,246,0.35)'],['#a78bfa','rgba(167,139,250,0.13)','rgba(167,139,250,0.35)'],['#34d399','rgba(52,211,153,0.13)','rgba(52,211,153,0.35)'],['#fbbf24','rgba(251,191,36,0.13)','rgba(251,191,36,0.35)'],['#f87171','rgba(248,113,113,0.13)','rgba(248,113,113,0.35)'],['#38bdf8','rgba(56,189,248,0.13)','rgba(56,189,248,0.35)']];
const PC={};let ci=0;
const gc=p=>{if(!PC[p])PC[p]=CP[ci++%CP.length];return PC[p];};
const uc=u=>u>=80?'#34d399':u>=60?'#fbbf24':'#f87171';
let data=[...DATA],sk='',sa=true,af='all',sv='';
const KS=['nombre','proceso','prod','util','tiempo','unidades'];
const AS=['a0','a1','a2','a3','a4','a5'];
function init(){
  document.getElementById('db').textContent=FECHA;
  document.getElementById('rc').textContent=DATA.length+' registros · '+FECHA;
  const procs=[...new Set(DATA.map(r=>r.proceso))].sort();
  const f=document.getElementById('flt');f.innerHTML='';
  const b=document.createElement('button');b.className='fb active';b.dataset.f='all';b.textContent='Todos';b.onclick=function(){sf(this);};f.appendChild(b);
  procs.forEach(p=>{const btn=document.createElement('button');btn.className='fb';btn.dataset.f=p;btn.textContent=p;btn.onclick=function(){sf(this);};f.appendChild(btn);});
  ren();
}
function ren(){
  const vis=data.filter(r=>(af==='all'||r.proceso===af)&&(!sv||r.nombre.toLowerCase().includes(sv)));
  const tb=document.getElementById('tb');
  if(!vis.length){tb.innerHTML='<tr><td colspan="6" class="empty">Sin resultados</td></tr>';st([]);return;}
  tb.innerHTML=vis.map(r=>{const[c,bg]=gc(r.proceso);const col=uc(r.util);return`<tr><td><div class="rep-name">${r.nombre}</div></td><td><span class="proc-badge" style="background:${bg};color:${c}">${r.proceso}</span></td><td class="right" style="font-family:'DM Mono',monospace;font-weight:500">${r.prod}</td><td><div class="util-row"><div class="util-bar"><div class="util-fill" style="width:${Math.min(r.util,100)}%;background:${col}"></div></div><span class="util-v" style="color:${col}">${r.util}%</span></div></td><td><span class="mono">${r.tiempo}</span></td><td class="right" style="font-family:'DM Mono',monospace;font-weight:500">${r.unidades.toLocaleString()}</td></tr>`;}).join('');
  st(vis);
}
function st(v){
  const n=v.length;
  if(!n){['s1','s2','s3','s4','fp','fu','fuu'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent='—';});return;}
  const ap=(v.reduce((a,r)=>a+r.prod,0)/n).toFixed(1);
  const au=(v.reduce((a,r)=>a+r.util,0)/n).toFixed(1);
  const su=v.reduce((a,r)=>a+r.unidades,0).toLocaleString();
  document.getElementById('s1').textContent=new Set(v.map(r=>r.nombre)).size;
  document.getElementById('s2').textContent=ap;
  document.getElementById('s3').textContent=au+'%';
  document.getElementById('s4').textContent=su;
  document.getElementById('fp').textContent=ap;
  document.getElementById('fu').textContent=au+'% prom.';
  document.getElementById('fuu').textContent=su;
}
function sf(btn){
  document.querySelectorAll('.fb').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.color='';b.style.borderColor='';});
  af=btn.dataset.f;
  if(af==='all')btn.classList.add('active');
  else{const[c,bg,br]=gc(af);btn.style.background=bg;btn.style.color=c;btn.style.borderColor=br;}
  apl();
}
function apl(){sv=document.getElementById('srch').value.toLowerCase().trim();ren();}
function srt(key){
  sa=sk===key?!sa:true;sk=key;
  AS.forEach(id=>{const e=document.getElementById(id);if(e){e.textContent='↕';e.closest('th').classList.remove('sorted');}});
  const idx=KS.indexOf(key);
  if(idx>=0){const e=document.getElementById(AS[idx]);if(e){e.textContent=sa?'↑':'↓';e.closest('th').classList.add('sorted');}}
  data.sort((a,b)=>{let va=a[key],vb=b[key];if(typeof va==='string'){va=va.toLowerCase();vb=vb.toLowerCase();}return sa?(va>vb?1:va<vb?-1:0):(va<vb?1:va>vb?-1:0);});
  ren();
}
init();
</script>
</body>
</html>
