<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de Productividad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1e2333;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --text2: #8b909e;
    --text3: #555b6b;
    --pick: #3b82f6;
    --pick-bg: rgba(59,130,246,0.12);
    --p2s: #a78bfa;
    --p2s-bg: rgba(167,139,250,0.12);
    --pack: #34d399;
    --pack-bg: rgba(52,211,153,0.12);
    --green: #34d399;
    --amber: #fbbf24;
    --red: #f87171;
    --accent: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }
  .container { max-width: 1000px; margin: 0 auto; }

  /* Header */
  .header { margin-bottom: 2rem; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
  .header-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; color: var(--text); }
  .header-date { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .upload-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    transition: all .2s;
    display: flex; align-items: center; gap: 6px;
  }
  .upload-btn:hover { border-color: var(--accent); color: var(--text); }
  #file-input { display: none; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
    opacity: 0.6;
  }
  .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
  .stat-val { font-size: 24px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; }

  /* Controls */
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .fb {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .3px;
  }
  .fb:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .fb.active-all  { background: rgba(255,255,255,0.08); color: var(--text); border-color: rgba(255,255,255,0.2); }
  .fb.active-Pick { background: var(--pick-bg); color: var(--pick); border-color: rgba(59,130,246,0.3); }
  .fb.active-P2S  { background: var(--p2s-bg); color: var(--p2s); border-color: rgba(167,139,250,0.3); }
  .fb.active-Pack { background: var(--pack-bg); color: var(--pack); border-color: rgba(52,211,153,0.3); }
  .search-wrap { flex: 1; min-width: 200px; }
  .search-wrap input {
    font-family: 'DM Sans', sans-serif;
    width: 100%;
    font-size: 13px;
    padding: 7px 12px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }

  /* Table */
  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { border-bottom: 1px solid var(--border2); }
  th {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-align: left;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    text-transform: uppercase;
    letter-spacing: .5px;
    background: var(--bg2);
    transition: color .15s;
  }
  th:hover { color: var(--text2); }
  th.right { text-align: right; }
  th.sorted { color: var(--accent); }
  .sa { font-size: 10px; margin-left: 3px; opacity: .5; }
  th.sorted .sa { opacity: 1; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.025); }
  tbody tr.hidden { display: none; }
  td { padding: 11px 14px; vertical-align: middle; background: var(--bg2); }
  td.right { text-align: right; }
  .rep-name { font-weight: 500; font-size: 13px; color: var(--text); }
  .proc-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: .4px;
    text-transform: uppercase;
  }
  .b-Pick { background: var(--pick-bg); color: var(--pick); }
  .b-P2S  { background: var(--p2s-bg);  color: var(--p2s); }
  .b-Pack { background: var(--pack-bg); color: var(--pack); }
  .b-other { background: rgba(255,255,255,0.06); color: var(--text2); }
  .util-row { display: flex; align-items: center; gap: 8px; }
  .util-bar { flex: 1; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.07); overflow: hidden; min-width: 50px; }
  .util-fill { height: 100%; border-radius: 2px; transition: width .3s; }
  .util-v { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; min-width: 40px; text-align: right; }
  .mono { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }
  .prod-num { font-family: 'DM Mono', monospace; font-weight: 500; }
  .units-num { font-family: 'DM Mono', monospace; font-weight: 500; }

  /* Footer row */
  tfoot td {
    background: var(--bg3);
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    border-top: 1px solid var(--border2);
    padding: 9px 14px;
  }

  /* Empty state */
  .empty { text-align: center; padding: 3rem; color: var(--text3); font-size: 13px; }

  /* Drop zone overlay */
  .drop-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(15,17,23,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    font-size: 18px;
    color: var(--text2);
    border: 2px dashed var(--border2);
  }
  .drop-overlay.show { display: flex; }
  .drop-overlay .drop-icon { font-size: 48px; opacity: .4; }

  /* Process colors dynamic */
  .process-colors { }
</style>
</head>
<body>

<div class="drop-overlay" id="drop-overlay">
  <div class="drop-icon">📂</div>
  <div>Suelta los CSVs aquí</div>
</div>

<div class="container">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">Reporte de productividad</div>
        <div class="header-date" id="header-date">11 mayo 2026</div>
      </div>
      <label class="upload-btn" for="file-input">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Subir CSVs
      </label>
      <input type="file" id="file-input" accept=".csv" multiple>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-label">Representantes</div><div class="stat-val" id="s-reps">—</div></div>
      <div class="stat"><div class="stat-label">Prod. neta prom.</div><div class="stat-val" id="s-prod">—</div></div>
      <div class="stat"><div class="stat-label">Utilización prom.</div><div class="stat-val" id="s-util">—</div></div>
      <div class="stat"><div class="stat-label">Total unidades</div><div class="stat-val" id="s-units">—</div></div>
    </div>

    <div class="controls">
      <div class="filters" id="filters">
        <button class="fb active-all" data-f="all" onclick="setFilter(this)">Todos</button>
      </div>
      <div class="search-wrap">
        <input type="search" id="search" placeholder="Buscar representante..." oninput="applyAll()">
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:210px" onclick="sortBy('nombre')">Representante <span class="sa" id="arr-nombre">↕</span></th>
          <th style="width:90px" onclick="sortBy('proceso')">Proceso <span class="sa" id="arr-proceso">↕</span></th>
          <th style="width:85px;text-align:right" onclick="sortBy('prod')">Prod. neta <span class="sa" id="arr-prod">↕</span></th>
          <th style="width:130px" onclick="sortBy('util')">Utilización <span class="sa" id="arr-util">↕</span></th>
          <th style="width:95px" onclick="sortBy('tiempo')">T. proceso <span class="sa" id="arr-tiempo">↕</span></th>
          <th style="width:85px;text-align:right" onclick="sortBy('unidades')">Unidades <span class="sa" id="arr-unidades">↕</span></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6" class="empty">Sube los archivos CSV para ver el reporte</td></tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="2">Promedio / Total visible</td>
          <td style="text-align:right" id="f-prod">—</td>
          <td id="f-util">—</td>
          <td></td>
          <td style="text-align:right" id="f-units">—</td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<script>
let ALL_DATA = [];
let sortKey = '', sortAsc = true, activeFilter = 'all', searchVal = '';
const PROCESS_COLORS = {};
const COLOR_POOL = [
  ['#3b82f6','rgba(59,130,246,0.12)','rgba(59,130,246,0.3)'],
  ['#a78bfa','rgba(167,139,250,0.12)','rgba(167,139,250,0.3)'],
  ['#34d399','rgba(52,211,153,0.12)','rgba(52,211,153,0.3)'],
  ['#f59e0b','rgba(245,158,11,0.12)','rgba(245,158,11,0.3)'],
  ['#f87171','rgba(248,113,113,0.12)','rgba(248,113,113,0.3)'],
  ['#38bdf8','rgba(56,189,248,0.12)','rgba(56,189,248,0.3)'],
  ['#fb7185','rgba(251,113,133,0.12)','rgba(251,113,133,0.3)'],
  ['#a3e635','rgba(163,230,53,0.12)','rgba(163,230,53,0.3)'],
];
let colorIdx = 0;

function getProcessColor(proc) {
  if (!PROCESS_COLORS[proc]) {
    PROCESS_COLORS[proc] = COLOR_POOL[colorIdx % COLOR_POOL.length];
    colorIdx++;
  }
  return PROCESS_COLORS[proc];
}

function getUtilColor(u) {
  if (u >= 80) return '#34d399';
  if (u >= 60) return '#fbbf24';
  return '#f87171';
}

function parseUtil(s) {
  if (!s || s === '0%') return 0;
  return parseFloat(String(s).replace('%','')) || 0;
}

function parseCSV(text, filename) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  const proceso = filename.replace(/\.csv$/i,'');
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = lines[i].split(',').map(v => v.trim().replace(/^"|"$/g,''));
    const obj = {};
    headers.forEach((h,j) => obj[h] = vals[j] || '');
    const nombre = obj['Representantes'] || '';
    if (!nombre) continue;
    rows.push({
      nombre,
      proceso,
      prod: parseInt(obj['Prod. neta sist.']) || 0,
      util: parseUtil(obj['Utilización']),
      tiempo: obj['Tiempo en proceso sist.'] || '—',
      unidades: parseInt(obj['Unidades']) || 0,
    });
  }
  return rows;
}

function loadFiles(files) {
  const readers = [];
  for (const file of files) {
    readers.push(new Promise(res => {
      const r = new FileReader();
      r.onload = e => res({ text: e.target.result, name: file.name });
      r.readAsText(e => {}, file);
      r.readAsText(file, 'utf-8');
    }));
  }
  Promise.all(readers).then(results => {
    ALL_DATA = [];
    for (const {text, name} of results) {
      const rows = parseCSV(text, name);
      ALL_DATA.push(...rows);
    }
    rebuildFilters();
    render();
  });
}

function rebuildFilters() {
  const procs = [...new Set(ALL_DATA.map(r => r.proceso))].sort();
  const fil = document.getElementById('filters');
  fil.innerHTML = `<button class="fb active-all" data-f="all" onclick="setFilter(this)">Todos</button>`;
  procs.forEach(p => {
    const [color,,border] = getProcessColor(p);
    const btn = document.createElement('button');
    btn.className = 'fb';
    btn.dataset.f = p;
    btn.textContent = p;
    btn.onclick = function(){ setFilter(this); };
    fil.appendChild(btn);
  });
}

function render() {
  const tbody = document.getElementById('tbody');
  const visible = ALL_DATA.filter(r => {
    const fm = activeFilter === 'all' || r.proceso === activeFilter;
    const sm = !searchVal || r.nombre.toLowerCase().includes(searchVal);
    return fm && sm;
  });

  document.getElementById('rep-count') && (document.getElementById('rep-count').textContent = visible.length);

  if (!visible.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">Sin resultados</td></tr>`;
    updateStats([]);
    return;
  }

  const sorted = [...visible];
  if (sortKey) {
    sorted.sort((a, b) => {
      let va = a[sortKey], vb = b[sortKey];
      if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      return sortAsc ? (va > vb ? 1 : va < vb ? -1 : 0) : (va < vb ? 1 : va > vb ? -1 : 0);
    });
  }

  tbody.innerHTML = sorted.map(r => {
    const [color, bg, border] = getProcessColor(r.proceso);
    const uc = getUtilColor(r.util);
    const up = Math.min(Math.round(r.util), 100);
    return `<tr>
      <td><div class="rep-name">${r.nombre}</div></td>
      <td><span class="proc-badge" style="background:${bg};color:${color}">${r.proceso}</span></td>
      <td class="right"><span class="prod-num">${r.prod}</span></td>
      <td><div class="util-row"><div class="util-bar"><div class="util-fill" style="width:${up}%;background:${uc}"></div></div><span class="util-v" style="color:${uc}">${r.util}%</span></div></td>
      <td><span class="mono">${r.tiempo}</span></td>
      <td class="right"><span class="units-num">${r.unidades.toLocaleString()}</span></td>
    </tr>`;
  }).join('');

  updateStats(visible);
}

function updateStats(visible) {
  const n = visible.length;
  if (!n) {
    ['s-reps','s-prod','s-util','s-units','f-prod','f-util','f-units'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = '—';
    });
    return;
  }
  const ap = (visible.reduce((a,r) => a+r.prod, 0) / n).toFixed(1);
  const au = (visible.reduce((a,r) => a+r.util, 0) / n).toFixed(1);
  const su = visible.reduce((a,r) => a+r.unidades, 0).toLocaleString();
  const names = new Set(visible.map(r => r.nombre));
  document.getElementById('s-reps').textContent = names.size;
  document.getElementById('s-prod').textContent = ap;
  document.getElementById('s-util').textContent = au + '%';
  document.getElementById('s-units').textContent = su;
  document.getElementById('f-prod').textContent = ap;
  document.getElementById('f-util').textContent = au + '% prom.';
  document.getElementById('f-units').textContent = su;
}

function setFilter(btn) {
  document.querySelectorAll('.fb').forEach(b => {
    b.className = 'fb';
  });
  const f = btn.dataset.f;
  if (f === 'all') {
    btn.className = 'fb active-all';
  } else {
    const [color, bg, border] = getProcessColor(f);
    btn.style.background = bg;
    btn.style.color = color;
    btn.style.borderColor = border;
    btn.className = 'fb';
  }
  activeFilter = f;
  applyAll();
}

function applyAll() {
  searchVal = document.getElementById('search').value.toLowerCase().trim();
  render();
}

function sortBy(key) {
  if (sortKey === key) { sortAsc = !sortAsc; } else { sortKey = key; sortAsc = true; }
  document.querySelectorAll('.sa').forEach(a => { a.textContent = '↕'; a.closest('th').classList.remove('sorted'); });
  const arr = document.getElementById('arr-' + key);
  if (arr) { arr.textContent = sortAsc ? '↑' : '↓'; arr.closest('th').classList.add('sorted'); }
  render();
}

// File input
document.getElementById('file-input').addEventListener('change', function(e) {
  if (e.target.files.length) loadFiles(e.target.files);
});

// Drag & drop
document.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('drop-overlay').classList.add('show'); });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) document.getElementById('drop-overlay').classList.remove('show'); });
document.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('drop-overlay').classList.remove('show');
  const files = [...e.dataTransfer.files].filter(f => f.name.endsWith('.csv'));
  if (files.length) loadFiles(files);
});

// Update date
const now = new Date();
document.getElementById('header-date').textContent = now.toLocaleDateString('es-MX', { day:'numeric', month:'long', year:'numeric' });
</script>
</body>
</html>
